name: Update and publish World Cup bracket

on:
  workflow_dispatch:
  schedule:
    # 10:30 PM PDT is 05:30 UTC during the June/July 2026 tournament.
    - cron: "30 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh World Cup data
        run: python3 update_data.py

      - name: Commit updated data back to the repository
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup-data.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update World Cup bracket data"
            git push
          fi

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp index.html worldcup-data.json _site/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
