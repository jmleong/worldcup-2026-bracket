name: Update and publish World Cup bracket

on:
  workflow_dispatch:
  schedule:
    # Daily 10:30 PM PDT snapshot refresh during the tournament.
    # GitHub cron uses UTC. 05:30 UTC = 10:30 PM PDT.
    - cron: "30 5 11-30 6 *"
    - cron: "30 5 1-20 7 *"

    # Match-window score polling, about every 10 minutes during normal match hours.
    # Offset minutes avoid the top of the hour.
    - cron: "7/10 14-23 11-30 6 *"
    - cron: "7/10 0-6 12-30 6 *"
    - cron: "7/10 14-23 1-19 7 *"
    - cron: "7/10 0-6 1-20 7 *"
    - cron: "7/10 14-18 20 7 *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh World Cup data
        run: python3 update_data.py

      - name: Check whether data changed
        id: changes
        run: |
          if git diff --quiet -- worldcup-data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No worldcup-data.json changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "worldcup-data.json changed."
          fi

      - name: Commit updated data back to the repository
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup-data.json
          git commit -m "Update World Cup bracket data"
          git push

      - name: Prepare site files
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p _site
          cp index.html styles.css app.js worldcup-data.json _site/
          touch _site/.nojekyll
          echo "Published files:"
          find _site -maxdepth 1 -type f -printf "%f\n" | sort

      - name: Verify required website files
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          test -s _site/index.html
          test -s _site/styles.css
          test -s _site/app.js
          test -s _site/worldcup-data.json

      - name: Configure GitHub Pages
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload site files
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@v4
