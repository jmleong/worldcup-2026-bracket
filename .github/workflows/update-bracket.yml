name: Update and publish World Cup bracket

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Deploy even if worldcup-data.json did not change"
        required: false
        type: boolean
        default: true
  schedule:
    # Daily snapshot refresh at 10:30 PM PDT, plus retry runs at 10:35 and 10:45 PM PDT.
    # GitHub cron uses UTC. During PDT (UTC-7): 05:30/05:35/05:45 UTC = 10:30/10:35/10:45 PM PDT.
    - cron: "30 5 11-30 6 *"
    - cron: "35 5 11-30 6 *"
    - cron: "45 5 11-30 6 *"
    - cron: "30 5 1-20 7 *"
    - cron: "35 5 1-20 7 *"
    - cron: "45 5 1-20 7 *"

    # During-match score polling — every 10 minutes across the full PDT match day window.
    # PDT match hours: ~9 AM PDT (16:00 UTC) through ~1 AM PDT next day (08:00 UTC).
    - cron: "7/10 14-23 11-30 6 *"
    - cron: "7/10 0-8 12-30 6 *"
    - cron: "7/10 14-23 1-19 7 *"
    - cron: "7/10 0-8 2-20 7 *"
    - cron: "7/10 14-18 20 7 *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      UPDATE_MODE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'scheduled' }}
      GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh World Cup data
        id: refresh
        run: python3 update_data.py --mode "$UPDATE_MODE"

      - name: Commit updated data back to the repository
        if: steps.refresh.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup-data.json
          git commit -m "Update World Cup bracket data"
          git push

      - name: Prepare site files
        if: steps.refresh.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p _site
          cp index.html styles.css app.js worldcup-data.json _site/
          touch _site/.nojekyll
          echo "Published files:"
          find _site -maxdepth 1 -type f -printf "%f\n" | sort

      - name: Verify required website files
        if: steps.refresh.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          test -s _site/index.html
          test -s _site/styles.css
          test -s _site/app.js
          test -s _site/worldcup-data.json

      - name: Configure GitHub Pages
        if: steps.refresh.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload site files
        if: steps.refresh.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        if: steps.refresh.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@v4
